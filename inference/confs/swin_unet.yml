attention_resolutions: 32,16,8
class_cond: false
diffusion_steps: 1000
learn_sigma: true
noise_schedule: cosine  # SwinUNet trained with cosine, inference must match training
num_channels: 128
num_head_channels: 128
num_in_channels: 3
num_out_channels: 6
num_heads: [3, 6, 12, 24]
num_res_blocks: 3
resblock_updown: true
use_fp16: false
use_scale_shift_norm: true
classifier_scale: 4.0
lr_kernel_n_std: 2
num_samples: -1
show_progress: true
# timestep_respacing: null  # Use null for no respacing, using full 1000 steps
timestep_respacing: '250'  # Use 250 steps for faster inference (change to '1000' for full steps)
use_kl: false
predict_xstart: false
rescale_timesteps: false
rescale_learned_sigmas: false
classifier_use_fp16: false
classifier_width: 128
classifier_depth: 2
classifier_attention_resolutions: 32,16,8
classifier_use_scale_shift_norm: true
classifier_resblock_updown: true
classifier_pool: attention
num_heads_upsample: -1
channel_mult: ''
dropout: 0.0
use_checkpoint: false
use_new_attention_order: false
clip_denoised: true
use_ddim: false
# DDIM sampling parameters (effective when use_ddim=true)
ddim_eta: 0.5  # DDIM eta parameter, controls stochasticity (0.0=deterministic, 1.0=fully random)
image_size: 512
seed: 36  # Random seed for reproducible inference
model_path: '/mnt/user/Checkpoints/WaveGuideDiff_swinunet_baseline/log_cosine_batch4/ema_0.9999_100000.pt'
name: SwinUNet
model_type: swin_unet  # Model type: "swin_unet" (SwinUNet) or "unet" (traditional UNet)
inpa_inj_sched_prev: true
n_jobs: 1
print_estimated_vars: true
inpa_inj_sched_prev_cumnoise: false

# Additional config entries
respace_interpolate: false
use_value_logger: false

# DDIM mode: no jump sampling
# schedule_jump_params: null

# DDPM mode: using jump sampling (uncomment when use_ddim=false)
schedule_jump_params:
  t_T: 250
  n_sample: 1
  jump_length: 1
  jump_n_sample: 5
data:
  eval:
    paper_face_mask:
      mask_loader: true
      gt_path: "/mnt/user/Data/Guide_Inpainting_Polar/Nowith_guide/test_images"
      mask_path: "/mnt/user/Data/Guide_Inpainting_Polar/Nowith_guide/test_masks"
      image_size: 512
      class_cond: false
      deterministic: true
      random_crop: false
      random_flip: false
      return_dict: true
      drop_last: false
      batch_size: 1
      return_dataloader: true
      offset: 0
      max_len: null
      num_workers: 0
      paths:
        srs: '/mnt/user/Checkpoints/WaveGuideDiff_swinunet_baseline/cosine_noper_ddpm_250_1_1_5_100000_36_batch1/srs'
        lrs: '/mnt/user/Checkpoints/WaveGuideDiff_swinunet_baseline/cosine_noper_ddpm_250_1_1_5_100000_36_batch1/lrs'
        gts: '/mnt/user/Checkpoints/WaveGuideDiff_swinunet_baseline/cosine_noper_ddpm_250_1_1_5_100000_36_batch1/gts'
        gt_keep_masks: '/mnt/user/Checkpoints/WaveGuideDiff_swinunet_baseline/cosine_noper_ddpm_250_1_1_5_100000_36_batch1/gt_keep_masks'
